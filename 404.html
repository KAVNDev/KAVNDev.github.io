<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | KAVN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 8rem;
      font-weight: 800;
      opacity: 0.15;
      line-height: 1;
    }
    .error-page p {
      font-size: 1.25rem;
      color: rgb(255 255 255 / 0.6);
      margin: 1rem 0 2rem;
    }
    .error-page a {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: #ffffff;
      color: #0a0a0a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: transform 0.3s ease;
    }
    .error-page a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>404</h1>
    <p>This page doesn't exist. Let's get you back on track.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
